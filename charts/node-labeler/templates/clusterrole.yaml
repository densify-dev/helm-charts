{{- if .Values.rbac.create }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "node-labeler.fullname" . }}-manager-role
  labels:
    {{- include "node-labeler.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list", "watch", "patch", "update"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
  - apiGroups: ["machine.openshift.io"]
    resources: ["machines"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["machine.openshift.io"]
    resources: ["machinesets"]
    verbs: ["get", "list", "watch"]
{{- end }}
