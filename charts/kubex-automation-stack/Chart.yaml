apiVersion: v2
description: Kubex Collection Stack
name: kubex-automation-stack
version: 1.0.11
type: application
icon: https://www.kubex.ai/wp-content/uploads/kubex-by-densify-logo.png
dependencies:
  - name: container-optimization-data-forwarder
    version: "4.*.*"
    repository: https://densify-dev.github.io/helm-charts
  - name: prometheus
    version: "27.*.*"
    repository: https://prometheus-community.github.io/helm-charts
    condition: stack.prometheus.deploy
  - name: k8s-ephemeral-storage-metrics
    version: "1.*.*"
    repository: https://densify-dev.github.io/helm-charts
    condition: k8s-ephemeral-storage-metrics.enabled
  - name: node-labeler
    version: "0.*.*"
    repository: https://densify-dev.github.io/helm-charts
    condition: node-labeler.enabled
keywords:
- kubex
- densify
- container
- optimization
maintainers:
- email: support@kubex.ai
  name: support
