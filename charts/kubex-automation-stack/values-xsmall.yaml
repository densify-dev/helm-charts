# Use this file for a small k8s cluster (0-500 containers):
prometheus:
  server:
    resources:
      requests:
        memory: "512Mi"
        cpu: "200m"
      limits:
        memory: "1Gi"
  prometheus-node-exporter:
    resources:
      requests:
        memory: "20Mi"
        cpu: "10m"
      limits:
        memory: "40Mi"
beyla:
  resources:
    requests:
      memory: "192Mi"
      cpu: "50m"
    limits:
      memory: "512Mi"

k8s-ephemeral-storage-metrics:
  interval: 15
  max_node_concurrency: 10
  client_go_qps: 5
  client_go_burst: 10
  resources:
    requests:
      memory: "64Mi"
      cpu: "50m"
    limits:
      memory: "128Mi"
      cpu: "200m"
