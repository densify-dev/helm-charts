#################################################################
# Kubex Data Collector
# kubex/container-optimization-data-forwarder parameters
#################################################################

openshift:
  enabled: false

rbac:
  create: true
  permissions:
    cdi:
      serviceAccount:
        create: true
        name: kubex-ai-cdi-sa
      clusterRole:
        create: true
        name: kubex-ai-cdi-reader
      clusterRoleBinding:
        create: true
        name: kubex-ai-cdi-reader
      role:
        create: false
        name: kubex-ai-cdi-reader
      roleBinding:
        create: false
        name: kubex-ai-cdi-reader
      rules:
        core:
          enabled: true
          resources: ["pods", "services", "configmaps", "namespaces", "nodes", "events"]
          verbs: ["get", "list"]
        podLogs:
          enabled: true
          resources: ["pods/log"]
          verbs: ["get"]
        workloads:
          enabled: true
          resources: ["deployments", "daemonsets", "statefulsets", "replicasets"]
          verbs: ["get", "list"]
        # Automatically enable OpenShift permissions when openshift mode is on.
        openshift:
          enabled: null
          resources: ["machines", "machinesets", "machinedeployments", "machinehealthchecks", "controlplanemachinesets"]
          verbs: ["get", "list"]
        karpenter:
          enabled: true
          resources: ["nodepools", "nodeclaims"]
          verbs: ["get", "list"]
        karpenterAWS:
          enabled: true
          resources: ["ec2nodeclasses"]
          verbs: ["get", "list"]
        rollouts:
          enabled: true
          resources: ["rollouts", "analysisruns", "experiments"]
          verbs: ["get", "list"]
        kubexCRDs:
          enabled: true
          resources: ["automationstrategies", "clusterautomationstrategies", "clustergpurebalancingpolicies", "clusterproactivepolicies", "clusterrollbackpolicies", "clusterstaticpolicies", "globalconfigurations", "gpuconsolidationpolicies", "gpurebalancingpolicies", "podaffinitypolicies", "policyevaluations", "proactivepolicies", "rollbackpolicies", "staticpolicies"]
          verbs: ["get", "list"]
        selfSubjectReview:
          enabled: true
          resources: ["selfsubjectrulesreviews", "selfsubjectaccessreviews"]
          verbs: ["create"]
    connector:
      serviceAccount:
        create: false
      clusterRole:
        create: false
      clusterRoleBinding:
        create: false
      role:
        create: false
      roleBinding:
        create: false
      rules: {}

stack:
  densify:
    createSecret: true
  prometheus:
    deploy: true

gpu-process-exporter:
  enabled: true

node-labeler:
  enabled: false

kubex-connector:
  enabled: false
  extraLabels: {}
  extraAnnotations: {}
  forwarderConfigMap:
    name: kubex-kubex-stack
  forwarderCredentialsSecretRef:
    name: densify-api-secret

kubex-ai-cdi:
  enabled: false
  extraLabels: {}
  extraAnnotations: {}
  rbac:
    enabled: false

container-optimization-data-forwarder:
  nameOverride: kubex-stack
  tolerations:
    - key: "kubernetes.io/arch"
      operator: "Exists"
      effect: "NoSchedule"
  extraLabels: {}
  extraAnnotations: {}
  job:
    enable: true
    checkPrometheusReady: true
  config:
    forwarder:
      densify:
        url:
          UserSecretName: densify-api-secret
    clusters: []
    prometheus:
      url:
        host: kubex-prometheus-server
        port: 80

#################################################################
# prometheus-community/prometheus parameters
#################################################################

prometheus:
  alertmanager:
    enabled: false 
  prometheus-pushgateway:
    enabled: false 
  kube-state-metrics:
    prometheusScrape: false
    tolerations:
      - key: "kubernetes.io/arch"
        operator: "Exists"
        effect: "NoSchedule"
    metricAnnotationsAllowList:
      - 'namespaces=[*]'
    metricLabelsAllowlist:
      - 'nodes=[*]'
      - 'namespaces=[*]'
      - 'pods=[*]'
      - 'deployments=[*]'
      - 'replicasets=[*]'
      - 'daemonsets=[*]'
      - 'statefulsets=[*]'
      - 'jobs=[*]'
      - 'cronjobs=[*]'
      - 'horizontalpodautoscalers=[*]'
    collectors:
      - cronjobs
      - daemonsets
      - deployments
      - horizontalpodautoscalers
      - jobs
      - namespaces
      - nodes
      - poddisruptionbudgets
      - pods
      - replicasets
      - replicationcontrollers
      - resourcequotas
      - statefulsets
  prometheus-node-exporter:
    service:
      port: 9191
      targetPort: 9191
      annotations:
        prometheus.io/scrape: "false"
    containerSecurityContext:
      readOnlyRootFilesystem: true
      allowPrivilegeEscalation: false
      capabilities:
        drop:
          - ALL
      seccompProfile:
        type: RuntimeDefault
    tolerations:
      - key: "kubernetes.io/arch"
        operator: "Exists"
        effect: "NoSchedule"
  server:
    fullnameOverride: kubex-prometheus-server
    tolerations:
      - key: "kubernetes.io/arch"
        operator: "Exists"
        effect: "NoSchedule"
    global:
      scrape_interval: 20s
      scrape_timeout: 10s
    persistentVolume:
      size: 50Gi
    retention: "2d"
    retentionSize: "40GiB"
    containerSecurityContext:
      readOnlyRootFilesystem: true
      allowPrivilegeEscalation: false
      capabilities:
        drop:
          - ALL
      seccompProfile:
        type: RuntimeDefault
  scrapeConfigs:
    prometheus:
      enabled: true
      metric_relabel_configs:
        - source_labels: [__name__]
          regex: '^prometheus_(build_info|tsdb.*)$'
          action: keep
    kubernetes-api-servers:
      enabled: true
      metric_relabel_configs:
        - source_labels: [__name__]
          regex: '^kubernetes_build_info$'
          action: keep
    kubernetes-nodes:
      enabled: true
      metric_relabel_configs:
        - source_labels: [__name__]
          regex: '^kubernetes_build_info$'
          action: keep
    kubernetes-nodes-cadvisor:
      enabled: true
      metric_relabel_configs:
        - source_labels: [__name__]
          regex: '^container_(cpu_(cfs_(periods_total|throttled_(periods_total|seconds_total))|usage_seconds_total)|fs_usage_bytes|memory_(rss|usage_bytes|working_set_bytes)|oom_events_total|spec_memory_limit_bytes)$'
          action: keep
    kubernetes-service-endpoints:
      enabled: true
      relabel_configs:
        - source_labels: [__meta_kubernetes_service_annotation_prometheus_io_scheme]
          action: replace
          target_label: __scheme__
          regex: (https?)
        - source_labels: [__meta_kubernetes_service_annotation_prometheus_io_path]
          action: replace
          target_label: __metrics_path__
          regex: (.+)
        - source_labels:
          - __address__
          - __meta_kubernetes_service_annotation_prometheus_io_port
          action: replace
          target_label: __address__
          regex: (.+?)(?::\d+)?;(\d+)
          replacement: $1:$2
        - action: labelmap
          regex: __meta_kubernetes_service_annotation_prometheus_io_param_(.+)
          replacement: __param_$1
        - action: labelmap
          regex: __meta_kubernetes_service_label_(.+)
        - source_labels: [__meta_kubernetes_namespace]
          action: replace
          target_label: namespace
        - source_labels: [__meta_kubernetes_service_name, __meta_kubernetes_pod_container_port_number]
          action: drop
          regex: '(kubex|densify)-kube-state-metrics;8081'
        - source_labels: [__meta_kubernetes_endpointslice_name]
          action: keep
          regex: '((kubex|densify)-(kube-state-metrics|prometheus-node-exporter|ephemeral-storage-collector|beyla)|gpu-process-exporter|.*dcgm|k8s-ephemeral-storage-metrics).*'
        - source_labels: [__meta_kubernetes_service_name]
          action: replace
          target_label: service
        - source_labels: [__meta_kubernetes_pod_node_name]
          action: replace
          target_label: node
      metric_relabel_configs:
        - source_labels: [__name__]
          regex: '^survey_info|(DCGM_FI_(DEV_(FB_(FREE|USED)|GPU_UTIL|POWER_USAGE)|PROF_(DRAM_ACTIVE|GR_ENGINE_ACTIVE|PIPE_TENSOR_ACTIVE))|kubex_gpu_container_.*|ephemeral_storage_(node_(available|capacity)|container_((rootfs|logs)_used_bytes|volume_usage))|kube_(cronjob_(created|info|labels|next_schedule_time|status_(active|last_schedule_time))|daemonset_(created|labels|status_number_available)|deployment_(created|labels|metadata_generation|spec_strategy_rollingupdate_max_(surge|unavailable))|horizontalpodautoscaler_(info|labels|spec_(max_replicas|min_replicas|target_metric)|status_(condition|current_replicas|target_metric))|job_(created|info|labels|owner|spec_(completions|parallelism)|status_(active|completion_time|start_time))|namespace_(annotations|labels)|node_(info|labels|role|spec_taint|status_(allocatable|capacity))|pod_((init_)?container_(info|resource_(limits|requests)|status_(last_terminated_(exitcode|timestamp)|restarts_total|terminated(?:_reason)?))|created|info|labels|owner|status_(phase|qos_class))|replicaset_(created|labels|owner|spec_replicas)|replicationcontroller_(created|spec_replicas)|resourcequota(?:_created)?|statefulset_(created|labels|replicas))|node_(cpu_(core_throttles_total|seconds_total)|disk_(read_bytes_total|reads_completed_total|writes_completed_total|written_bytes_total)|memory_(Buffers_bytes|Cached_bytes|MemFree_bytes|MemTotal_bytes|SReclaimable_bytes)|network_(receive_(bytes_total|packets_total)|speed_bytes|transmit_(bytes_total|packets_total))|vmstat_oom_kill)|openshift_clusterresourcequota_(created|labels|namespace_usage|selector|usage))$'
          action: keep
    kubernetes-service-endpoints-slow:
      enabled: false
    prometheus-pushgateway:
      enabled: false
    kubernetes-services:
      enabled: false
    kubernetes-pods:
      enabled: false
    kubernetes-pods-slow:
      enabled: false
  serverFiles:
    recording_rules.yml:
      groups:
        - name: kubex-gpu-container.rules
          rules:
            - record: kubex_gpu_container_sm_utilization_percent
              expr: rate(kubex_gpu_container_sm_utilization_percent_seconds_total[1m])
    prometheus.yml:
      rule_files:
        - /etc/config/recording_rules.yml
        - /etc/config/alerting_rules.yml
        - /etc/config/rules
        - /etc/config/alerts

beyla:
  enabled: true
  fullnameOverride: kubex-beyla
  preset: application
  privileged: true
  contextPropagation:
    enabled: false # Survey only - no context propagation needed
  tolerations:
    - key: "kubernetes.io/arch"
      operator: "Exists"
      effect: "NoSchedule"
  service:
    enabled: true
    port: 8999
    targetPort: 8999
    portName: metrics
  serviceMonitor:
    enabled: false # Disabled - using Prometheus scrape_configs instead
  config:
    data:
      attributes:
        kubernetes:
          enable: true
      discovery:
        # Remove built-in exclusions for kube-system, monitoring, cert-manager, etc.
        # Needed as the goal is survey visibility, not safe default instrumentation scope.
        default_exclude_instrument: []
        # Default min_process_age is 5s, which means shorter-lived processes will not be found;
        # however, currently survey mode picks the **first** runtime detected, so if the container
        # for example runs some shell commands for a longer period and then starts a java/go/... app,
        # the app runtime will not be detected
        # min_process_age: 5s
        survey:
          - k8s_namespace: "*"  # Match Kubernetes-owned processes in every namespace.
            containers_only: false  # keeps hostNetwork / hostPID pods eligible
      prometheus_export:
        port: 8999
        path: /metrics
        features:
          - application

#################################################################
# Ephemeral Storage Metrics Exporter
# Collects and exposes ephemeral storage metrics via a DaemonSet
#################################################################

k8s-ephemeral-storage-metrics:
  enabled: true
  nameOverride: kubex-ephemeral-storage-collector
  tolerations:
    - key: "kubernetes.io/arch"
      operator: "Exists"
      effect: "NoSchedule"
  serviceMonitor:
    enable: false  # Disabled - using Prometheus scrape_configs instead
