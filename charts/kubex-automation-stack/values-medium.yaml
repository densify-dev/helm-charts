# Use this file for a medium k8s cluster (5001-10000 containers):
prometheus:
  server:
    resources:
      requests:
        memory: "10Gi"
        cpu: "1000m"
      limits:
        memory: "20Gi"
  prometheus-node-exporter:
    resources:
      requests:
        memory: "30Mi"
        cpu: "20m"
      limits:
        memory: "80Mi"
beyla:
  resources:
    requests:
      memory: "256Mi"
      cpu: "50m"
    limits:
      memory: "512Mi"

k8s-ephemeral-storage-metrics:
  interval: 30
  max_node_concurrency: 20
  client_go_qps: 10
  client_go_burst: 20
  metrics:
    gc_enabled: true
    gc_interval: 5
    gc_batch_size: 500
  resources:
    requests:
      memory: "256Mi"
      cpu: "200m"
    limits:
      memory: "512Mi"
      cpu: "1000m"
  livenessProbe:
    timeoutSeconds: 45
  readinessProbe:
    timeoutSeconds: 45
