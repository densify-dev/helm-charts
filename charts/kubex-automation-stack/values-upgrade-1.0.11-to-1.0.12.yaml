#################################################################
# Upgrade overlay for Kubex Collection Stack 1.0.11 -> 1.0.12
#################################################################
#
# Version 1.0.12 moves the bundled Prometheus scrape jobs from
# prometheus.serverFiles.prometheus.yml.scrape_configs to
# prometheus.scrapeConfigs. When upgrading a release whose old values
# are reused, Helm can otherwise keep the legacy scrape_configs list and
# render duplicate Prometheus job names.

prometheus:
  serverFiles:
    prometheus.yml:
      scrape_configs: null
