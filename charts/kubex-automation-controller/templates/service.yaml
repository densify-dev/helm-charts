apiVersion: v1
kind: Service
metadata:
  name: kubex-webhook-service
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kubex-automation-controller.metadataLabels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: 443
      targetPort: 8443
      protocol: TCP
      name: https
  selector:
      app: kubex-webhook
