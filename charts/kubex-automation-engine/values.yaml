# CRD version check settings
crdCheck:
  # Set to true to skip the CRD version check job and RBACs (not recommended)
  skip: false
  # Minimum version of the kubex-crds chart required before this chart can be installed/upgraded.
  # Bump this whenever a new CRD field or schema change is required.
  minCRDsHelmVersion: "1.0.0"
# -- Whether to create the kubex-gateway-config Secret automatically
createSecrets: true

# Kubex API credentials (required when createSecrets is true)
kubex:
  url:
    # -- Kubex instance hostname (e.g., <customerName>.kubex.ai)
    host: ""
    # -- URL scheme used when deriving DENSIFY_BASE_URL from host
    scheme: "https"
  # -- Cluster name to identify this cluster in Kubex (required)
  clusterName: ""

  # -- Path to local recommendations file (optional, for testing only - overrides gateway)
  recommendationsPath: "/densify/data/recommendations/recommendations.json"

  # -- Request timeout for Kubex API calls
  requestTimeout: "30s"

kubexCredentials:
  # -- Username to access Kubex API
  username: ""
  # -- Encrypted password to access Kubex API
  epassword: ""
  # -- Not used by this chart. When createSecrets is false, set gateway.configSecretName instead.
  userSecretName: ""

# Default values for kubex-automation-engine.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

# -- Number of replicas for the controller manager
replicaCount: 1

image:
  # -- Image repository
  repository: densify/automation-controller
  # -- Image pull policy
  pullPolicy: IfNotPresent
  # -- Image tag
  tag: "1.0.0"

# -- Image pull secrets applied to the controller deployment and cleanup job
imagePullSecrets: []

cleanup:
  image:
    # -- Image repository for the pre-delete cleanup job.
    repository: "densify/kubex-automation-cleanup"
    # -- Image tag for the pre-delete cleanup job.
    tag: "1.0.0"
    # -- Image pull policy for the pre-delete cleanup job.
    pullPolicy: "IfNotPresent"
  # -- Optional pod security context for the pre-delete cleanup job
  podSecurityContext: {}
  # -- Container security context for the pre-delete cleanup job
  securityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - "ALL"

# -- Image pull secrets for private registries
# Example:
# imagePullSecrets:
#   - name: regcred
imagePullSecrets: []

# -- Override the name of the chart
nameOverride: ""

# -- Override the full name of the release
fullnameOverride: ""

serviceAccount:
  # -- Specifies whether a service account should be created
  create: true
  # -- Automatically mount a ServiceAccount's API credentials
  automount: true
  # -- Annotations to add to the service account
  annotations: {}
  # -- The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

# -- Annotations to add to the controller manager pod
podAnnotations:
  kubectl.kubernetes.io/default-container: manager

# -- Labels to add to the controller manager pod
podLabels: {}

# Platform-specific compatibility settings
openshift:
  # -- Enable OpenShift-oriented security context defaults without changing the default Kubernetes installation path
  enabled: false
  # -- Optional fsGroup applied when openshift.enabled=true and podSecurityContext.fsGroup is not already set
  fsGroup: null
  # -- Optional fsGroupChangePolicy applied when an fsGroup is set and podSecurityContext.fsGroupChangePolicy is not already set
  fsGroupChangePolicy: OnRootMismatch
  # -- Supplemental groups applied when openshift.enabled=true
  supplementalGroups: []

podSecurityContext:
  fsGroup: 65534
  runAsGroup: 65534
  runAsUser: 65534
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault

securityContext:
  readOnlyRootFilesystem: true
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - "ALL"

# Controller manager configuration
controllerManager:
  # -- Enable leader election for controller manager
  leaderElection:
    enabled: true

  # -- Health probe bind address
  healthProbeBindAddress: ":8081"

  # -- Metrics bind address
  metricsBindAddress: ":8080"

  # -- Additional arguments for the controller manager
  extraArgs:
    - --zap-log-level=info

  # -- GlobalConfiguration controller reconcile interval (maps to GLOBAL_CONFIG_RECONCILE_INTERVAL)
  globalConfigReconcileInterval: "1m"

  # -- Additional environment variables
  extraEnv: []

# Local recommendations injection (for local/dev testing)
localRecommendations:
  # -- Mount recommendations from a ConfigMap and use it as RECOMMENDATIONS_PATH
  enabled: false
  # -- ConfigMap name containing recommendations JSON
  configMapName: recommendations
  # -- Mount path for local recommendations
  mountPath: /etc/automation-controller/recommendations
  # -- File name inside the ConfigMap
  fileName: recommendations.json

# Gateway sidecar configuration
gateway:
  enabled: true
  image:
    repository: "densify/automation-gateway"
    tag: "1.3"
    pullPolicy: "IfNotPresent"
  # Name of the secret containing gateway config (mounted at /densify/config/api)
  configSecretName: "kubex-gateway-config"
  # -- Security context for the gateway sidecar
  securityContext:
    readOnlyRootFilesystem: true
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - "ALL"
  # -- Resource limits and requests for the gateway sidecar
  resources:
    limits:
      cpu: 200m
      memory: 256Mi
    requests:
      cpu: 10m
      memory: 64Mi

# Metrics service configuration
metrics:
  # -- Enable metrics service
  enabled: true
  # -- Service type for metrics
  type: ClusterIP
  # -- Service port for metrics
  port: 8080
  # -- Service annotations
  annotations:
    # Controller metrics are served over plain HTTP without authentication in this chart; the manager args set --metrics-secure=false when this scheme is used.
    prometheus.io/scrape: "true"
    prometheus.io/port: '{{ .Values.metrics.port }}'
    prometheus.io/path: '{{ .Values.metrics.serviceMonitor.path }}'
    prometheus.io/scheme: '{{ .Values.metrics.serviceMonitor.scheme }}'
  # -- Optional ServiceMonitor configuration for Prometheus Operator
  serviceMonitor:
    # -- Create a ServiceMonitor for the metrics Service
    enabled: false
    # -- Additional labels applied to the ServiceMonitor
    additionalLabels: {}
    # -- Namespace names to discover for the ServiceMonitor. Leave empty to watch all namespaces.
    namespaceSelector: []
    # -- Scrape scheme used by Prometheus
    scheme: http
    # -- Metrics endpoint path
    path: /metrics
    # -- Optional scrape interval
    interval: ""
    # -- Optional scrape timeout. Must be <= interval when interval is set.
    scrapeTimeout: ""

# Webhook configuration
webhook:
  # -- Enable or disable the webhook
  enabled: true
  # -- Webhook service port
  port: 9443
  # -- Failure policy for validating webhook (Ignore allows installation to proceed if webhook is unavailable)
  failurePolicy: Ignore
  # -- Certificate manager configuration
  certManager:
    # -- Enable cert-manager for webhook certificates (if false, uses self-signed)
    enabled: false

# Self-signed certificate configuration (used when webhook.certManager.enabled=false)
selfSignedCert:
  # -- Validity period in days for self-signed certificates
  validity: 3650

resources:
  limits:
    cpu: 500m
    memory: 2Gi
  requests:
    cpu: 10m
    memory: 64Mi

livenessProbe:
  httpGet:
    path: /healthz
    port: 8081
  initialDelaySeconds: 15
  periodSeconds: 20

readinessProbe:
  httpGet:
    path: /readyz
    port: 8081
  initialDelaySeconds: 5
  periodSeconds: 10

# -- Node selector for pod assignment
nodeSelector: {}

# -- Tolerations for pod assignment
tolerations:
  # Tolerate arch taints (works on both amd64 and arm64 clusters)
  - key: "kubernetes.io/arch"
    operator: "Exists"
    effect: "NoSchedule"

# -- Affinity for pod assignment
affinity: {}

# -- Topology spread constraints for pod assignment
# Helps distribute pods across zones, nodes, or other topology domains
# Example:
# topologySpreadConstraints:
#   - maxSkew: 1
#     topologyKey: topology.kubernetes.io/zone
#     whenUnsatisfiable: DoNotSchedule
#     labelSelector:
#       matchLabels:
#         control-plane: controller-manager
topologySpreadConstraints: []

# RBAC configuration
rbac:
  # -- Create RBAC resources
  create: true

# CRD installation
crds: {}

# Experimental feature acknowledgements for unstable APIs.
experimental:
  # -- Required acknowledgement token for GPU/KAI experimental fields.
  gpuKaiContract: "v1alpha1-2026-04"

# Global configuration defaults
# These will be used to create the default GlobalConfiguration CR
globalConfiguration:
  # -- Enable creation of default GlobalConfiguration
  enabled: true
  # -- Name of the GlobalConfiguration resource
  name: global-config
  # -- Recommendation reload interval (how often to fetch from Kubex)
  # Can also use deployment.controllerEnv.recommendationsFetchInterval for backward compatibility
  recommendationReloadInterval: "1h"
  # -- Rescan interval (how often to scan pods for recommendations)
  # Can also use deployment.controllerEnv.podScanInterval for backward compatibility
  rescanInterval: "6h"
  # -- Kubex API request timeout
  # Can also use deployment.controllerEnv.apiRequestTimeout for backward compatibility
  kubexAPIRequestTimeout: "30s"
  # -- Mutation log send interval
  mutationLogInterval: "5m"
  # -- GPU rebalancing policy workload check interval
  gpuRebalancingCheckInterval: "1m"
  # -- Policy snapshot upload interval
  snapshotInterval: "30m"
  # -- Controller heartbeat report interval
  heartbeatInterval: "5m"
  # -- Whether automation is globally enabled
  automationEnabled: true
  # -- Suppress fetching recommendations from gateway (testing only)
  suppressFetchRecommendations: false
  # -- Respect KubexAutomation flag in recommendations
  respectKubexAutomation: true
  # -- Namespace patterns protected from automation (supports "*" wildcard)
  protectedNamespacePatterns:
    - "kube-*"
    - "openshift-*"
  # -- Webhook probe health transition settings
  webhookHealth:
    # -- Consecutive failed probes required before webhook is considered unhealthy
    failureThreshold: 2
    # -- Consecutive successful probes required before webhook is considered healthy
    successThreshold: 3
    # -- Probe interval used while transitioning between healthy/unhealthy states
    transitionCheckInterval: "10s"
  # -- Dry-run pod configuration used for webhook health checks
  webhookProbe:
    # -- Container image used by the webhook probe pod. Defaults to the controller image.
    # Leave unset (null) to automatically use the controller image
    image:
    # -- Additional labels applied to the webhook probe pod.
    labels: {}
    # -- Additional annotations applied to the webhook probe pod.
    annotations: {}
    # -- Resource requests and limits for the webhook probe container.
    resources: {}
    # -- Pod security context for the webhook probe pod.
    podSecurityContext: {}
    # -- Container security context for the webhook probe container.
    securityContext: {}
  kai:
    # -- Scheduler name set on pods when Kai GPU mutation is applied by the webhook
    schedulerName: "kai-scheduler"
  prometheus:
    # -- Prometheus base URL used by GPU rebalancing policies
    url: "http://prometheus.monitoring.svc:9090"
    # -- Timeout for individual Prometheus query requests
    requestTimeout: "30s"

# Optional Run:ai Queue resources for Kai scheduler integrations
kaiQueues:
  # -- Create built-in Run:ai Queue resources (`kubex-parent-queue` and `kubex-unlimited-gpu-queue`)
  enabled: false

# ================================================================
# BACKWARD COMPATIBILITY: Legacy environment variable configuration
# These values are OPTIONAL and customize the default CRDs.
# If not provided, sensible defaults will be used.
#
# Usage:
# - If you have old deployment.controllerEnv: Keep it, values will be used
# - If you're a new user: Omit this section, good defaults will be applied
# - To customize: Set only the values you want to override
# ================================================================
deployment:
  controllerEnv:
    # Timing configuration → Maps to GlobalConfiguration
    recommendationsFetchInterval: "1h" # → globalConfiguration.recommendationReloadInterval
    podScanInterval: "6h" # → globalConfiguration.rescanInterval
    apiRequestTimeout: "30s" # → globalConfiguration.kubexAPIRequestTimeout

    # Resize method configuration → Maps to AutomationStrategy.inPlaceResize
    suppressInPlaceResizing: "false" # → automationStrategy.inPlaceResize.enabled (inverted)

    # Node capacity configuration → Maps to AutomationStrategy.safetyChecks
    nodeCpuHeadroom: "10%" # → automationStrategy.safetyChecks.nodeCpuHeadroom
    nodeMemoryHeadroom: "200Mi" # → automationStrategy.safetyChecks.nodeMemoryHeadroom

    # Retry configuration → Maps to AutomationStrategy.safetyChecks
    podEvictionCooldownPeriod: "30s" # → automationStrategy.safetyChecks.resizeRetryInterval

# Policy evaluation configuration
policyEvaluation:
  # -- Enable creation of default PolicyEvaluation
  enabled: true
  # -- Name of the PolicyEvaluation resource
  name: policy-evaluation

# ================================================================
# SECTION: AUTOMATION SCOPE - Define where automation applies
# Instructions:
# → Define one or more scopes to control which namespaces and workloads are automated
# → Each scope references a policy that defines HOW automation behaves
#
# IMPORTANT: You have TWO OPTIONS:
# Option A (Helm-Managed): Define scope/policy here, and Helm creates ClusterAutomationStrategy and ClusterProactivePolicy CRs automatically
# Option B (Manual CRs): Leave this empty and create strategy and policy CRs manually with kubectl
# Both approaches can coexist - use Helm for baseline config and manual CRs for advanced cases
# ================================================================
scope: []
  # Example scope configuration:
  # - name: base-optimization-scope    # Unique scope name
  #   policy: base-optimization         # Policy name (optional - uses defaultPolicy if omitted)
  #   weight: 0                         # Policy weight (higher = higher priority)
  #   namespaces:                       # Mandatory - defines which namespaces to include/exclude
  #     operator: NotIn                 # Options: In | NotIn
  #     values:
  #       - kube-system                 # System namespaces to exclude
  #       - kubex                       # Kubex namespace (exclude automation components)
  #   podLabels: []                     # Optional - defines which pods to include/exclude based on labels
  #     # Example - Exclude specific apps:
  #     # - key: app
  #     #   operator: NotIn
  #     #   values:
  #     #     - legacy-app
  #     #     - manual-sizing
  #     # Example - Only automate specific environments:
  #     # - key: environment
  #     #   operator: In
  #     #   values:
  #     #     - development
  #     #     - staging
# ================================================================
# SECTION: AUTOMATION POLICY - Define HOW automation behaves
# Instructions:
# → Adjust automation and resizing behavior as needed
# → You can define multiple policies by adding entries under 'policies'
# → Reference the desired policy by name in the 'scope[].policy' field above
#
# IMPORTANT: You have TWO OPTIONS:
# Option A (Helm-Managed): Define policies here, and Helm creates ClusterAutomationStrategy CRs automatically
# Option B (Manual CRs): Leave policies empty and create strategy CRs manually with kubectl
# Both approaches can coexist - use Helm for baseline config and manual CRs for advanced cases
# ================================================================
policy:
  # -- Global switch to enable/disable automation for the cluster
  automationEnabled: true

  # -- Default policy used when scope[].policy is not specified
  defaultPolicy: ""

  # -- Control where automation inclusion/exclusion rules are defined
  # false: Automation scope controlled ONLY by Helm configuration (recommended for GitOps)
  # true: Automation scope controlled by BOTH Helm configuration AND Kubex UI
  remoteEnablement: false

  # -- Policy definitions
  # Each policy defines specific automation behaviors
  # ⚠️ IMPORTANT: Policy names MUST follow RFC 1123 subdomain rules:
  #    ✅ Use: lowercase letters, numbers, hyphens, dots only
  #    ✅ Examples: base-optimization, dev-env, production.cpu
  #    ❌ Avoid: camelCase, snake_case, UPPERCASE, special characters
  policies: {}
    # Example policy configuration:
    # base-optimization:
    #   # Allowed workload types (comma-separated string)
    #   allowedPodOwners: "Deployment,StatefulSet,CronJob,Rollout,Job,AnalysisRun"
    #
    #   # Enablement controls which resource changes are allowed
    #   enablement:
    #     cpu:
    #       request:
    #         downsize: true
    #         upsize: true
    #         setFromUnspecified: true
    #         # floor: "10m"        # Optional minimum CPU request
    #         # ceiling: "4"        # Optional maximum CPU request
    #       limit:
    #         downsize: false
    #         upsize: true
    #         setFromUnspecified: false
    #         # floor: "10m"        # Optional minimum CPU limit
    #         # ceiling: "8"        # Optional maximum CPU limit
    #     memory:
    #       request:
    #         downsize: true
    #         upsize: true
    #         setFromUnspecified: true
    #         # floor: "32Mi"       # Optional minimum memory request
    #         # ceiling: "16Gi"     # Optional maximum memory request
    #       limit:
    #         downsize: false
    #         upsize: true
    #         setFromUnspecified: true
    #         # floor: "32Mi"       # Optional minimum memory limit
    #         # ceiling: "32Gi"     # Optional maximum memory limit
    #     gpu:
    #       # GPU is requests-only; limits are not supported.
    #       request:
    #         downsize: true
    #         upsize: true
    #         setFromUnspecified: true
    #         # floor: "1"          # Optional minimum GPU request
    #         # ceiling: "8"        # Optional maximum GPU request
    #
    #   # In-place resize configuration
    #   inPlaceResize:
    #     enabled: true
    #     containerRestart: false  # Allow container restarts during resize
    #
    #   # Pod eviction configuration
    #   podEviction:
    #     enabled: true
    #     retryPodDisruptionBudget: true  # Retry if PDB blocks eviction
    #
    #   # Safety checks for proactive policies (NEW: per-policy, takes precedence)
    #   safetyChecks:
    #     maxAnalysisAgeDays: 5  # Reject recommendations older than 5 days

  # -- BACKWARD COMPAT: Global safetyChecks applied to all scopes when not set per-policy.
  # Setting safetyChecks here (under policy:) is the OLD format and is still supported.
  # Per-policy safetyChecks (under policy.policies.<name>.safetyChecks) take precedence.
  # safetyChecks:
  #   maxAnalysisAgeDays: 5
