  <svg xmlns="http://www.w3.org/2000/svg" width="1160" height="340" viewBox="0 0 1160 340" role="img" aria-labelledby="title desc">
  <title id="title">Rollback backoff flow</title>
  <desc id="desc">Monitoring either succeeds or starts rollback; rollback then enters backing off, which ends in backed off or failed permanently when attempts are exhausted.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,5 L0,10 z" fill="#4b5563"/>
    </marker>
    <style>
      .box { fill: #ffffff; stroke: #1f2937; stroke-width: 2; rx: 12; ry: 12; }
      .label { fill: #111827; font-family: Arial, Helvetica, sans-serif; font-size: 18px; font-weight: 700; }
      .sub { fill: #374151; font-family: Arial, Helvetica, sans-serif; font-size: 14px; }
      .arrow { stroke: #4b5563; stroke-width: 3; fill: none; marker-end: url(#arrow); }
      .note { fill: #f9fafb; stroke: #d1d5db; stroke-width: 1.5; rx: 10; ry: 10; }
    </style>
  </defs>

  <rect class="note" x="18" y="18" width="1124" height="304"/>

  <rect class="box" x="60" y="125" width="190" height="90"/>
  <text class="label" x="155" y="160" text-anchor="middle">monitoring</text>
  <text class="sub" x="155" y="185" text-anchor="middle">watch the workload</text>

  <rect class="box" x="330" y="30" width="230" height="90"/>
  <text class="label" x="445" y="65" text-anchor="middle">monitoringSucceeded</text>
  <text class="sub" x="445" y="90" text-anchor="middle">stays visible until new input</text>

  <rect class="box" x="330" y="195" width="230" height="90"/>
  <text class="label" x="445" y="230" text-anchor="middle">rollingBack</text>
  <text class="sub" x="445" y="255" text-anchor="middle">restore last known good state</text>

  <rect class="box" x="630" y="125" width="220" height="90"/>
  <text class="label" x="740" y="160" text-anchor="middle">backingOff</text>
  <text class="sub" x="740" y="185" text-anchor="middle">wait between turns</text>

  <rect class="box" x="910" y="30" width="220" height="90"/>
  <text class="label" x="1020" y="65" text-anchor="middle">backedOff</text>
  <text class="sub" x="1020" y="90" text-anchor="middle">more turns remain</text>

  <rect class="box" x="910" y="195" width="220" height="90"/>
  <text class="label" x="1020" y="230" text-anchor="middle">failedPermanent</text>
  <text class="sub" x="1020" y="255" text-anchor="middle">maxAttempts reached</text>

  <path class="arrow" d="M250 147 L330 75"/>
  <path class="arrow" d="M250 173 L330 220"/>
  <path class="arrow" d="M560 240 L630 170"/>
  <path class="arrow" d="M850 155 L910 75"/>
  <path class="arrow" d="M850 185 L910 240"/>

  <text class="sub" x="290" y="110" text-anchor="middle">healthy</text>
  <text class="sub" x="290" y="202" text-anchor="middle">failure</text>
  <text class="sub" x="595" y="230" text-anchor="middle">rollback complete</text>
  <text class="sub" x="880" y="110" text-anchor="middle">turn completes</text>
  <text class="sub" x="880" y="278" text-anchor="middle">attempts exhausted</text>
</svg>
