{{- if .Values.kaiQueues.enabled -}}
{{- if not (.Capabilities.APIVersions.Has "scheduling.run.ai/v2/Queue") -}}
{{- fail (printf "\n\nERROR: kaiQueues.enabled=true requires the Run:ai Queue CRD (apiVersion: scheduling.run.ai/v2, kind: Queue).\nInstall the Run:ai scheduling CRDs first, or disable queue creation with --set kaiQueues.enabled=false.") -}}
{{- end -}}
apiVersion: scheduling.run.ai/v2
kind: Queue
metadata:
  name: kubex-parent-queue
  labels:
    {{- include "kubex-automation-engine.labels" . | nindent 4 }}
spec:
  resources:
    cpu:
      quota: -1
      limit: -1
      overQuotaWeight: 1
    gpu:
      quota: -1
      limit: -1
      overQuotaWeight: 1
    memory:
      quota: -1
      limit: -1
      overQuotaWeight: 1
---
apiVersion: scheduling.run.ai/v2
kind: Queue
metadata:
  name: kubex-unlimited-gpu-queue
  labels:
    {{- include "kubex-automation-engine.labels" . | nindent 4 }}
spec:
  parentQueue: kubex-parent-queue
  resources:
    cpu:
      quota: -1
      limit: -1
      overQuotaWeight: 1
    gpu:
      quota: -1
      limit: -1
      overQuotaWeight: 1
    memory:
      quota: -1
      limit: -1
      overQuotaWeight: 1
{{- end -}}
