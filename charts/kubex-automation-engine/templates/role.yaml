{{- if .Values.rbac.create -}}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "kubex-automation-engine.fullname" . }}-manager-role
  labels:
    {{- include "kubex-automation-engine.labels" . | nindent 4 }}
rules:
- apiGroups:
  - ""
  resources:
  - limitranges
  - nodes
  - resourcequotas
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - ""
  resources:
  - namespaces
  - pods
  verbs:
  - get
  - list
  - patch
  - watch
- apiGroups:
  - ""
  resources:
  - pods/eviction
  verbs:
  - create
- apiGroups:
  - ""
  resources:
  - pods/resize
  verbs:
  - patch
- apiGroups:
  - ""
  - events.k8s.io
  resources:
  - events
  verbs:
  - create
  - patch
- apiGroups:
  - apps
  resources:
  - daemonsets
  - deployments
  - statefulsets
  verbs:
  - get
  - list
  - patch
  - watch
- apiGroups:
  - apps
  resources:
  - replicasets
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - argoproj.io
  resources:
  - analysisruns
  - rollouts
  verbs:
  - get
  - list
  - patch
  - watch
- apiGroups:
  - autoscaling
  resources:
  - horizontalpodautoscalers
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - autoscaling.k8s.io
  resources:
  - verticalpodautoscalers
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - batch
  resources:
  - cronjobs
  - jobs
  verbs:
  - get
  - list
  - patch
  - watch
- apiGroups:
  - coordination.k8s.io
  resources:
  - leases
  verbs:
  - create
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - core.strimzi.io
  resources:
  - strimzipodsets
  verbs:
  - get
  - list
  - patch
  - watch
- apiGroups:
  - rightsizing.kubex.ai
  resources:
  - automationstrategies
  - clusterautomationstrategies
  - clustergpurebalancingpolicies
  - clusterproactivepolicies
  - clusterrollbackpolicies
  - clusterstaticpolicies
  - globalconfigurations
  - gpuconsolidationpolicies
  - gpurebalancingpolicies
  - podaffinitypolicies
  - policyevaluations
  - proactivepolicies
  - rollbackpolicies
  - staticpolicies
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - rightsizing.kubex.ai
  resources:
  - clustergpurebalancingpolicies/finalizers
  - clusterproactivepolicies/finalizers
  - clusterrollbackpolicies/finalizers
  - clusterstaticpolicies/finalizers
  - globalconfigurations/finalizers
  - gpuconsolidationpolicies/finalizers
  - gpurebalancingpolicies/finalizers
  - podaffinitypolicies/finalizers
  - policyevaluations/finalizers
  - proactivepolicies/finalizers
  - rollbackpolicies/finalizers
  - staticpolicies/finalizers
  verbs:
  - update
- apiGroups:
  - rightsizing.kubex.ai
  resources:
  - clustergpurebalancingpolicies/status
  - clusterproactivepolicies/status
  - clusterrollbackpolicies/status
  - clusterstaticpolicies/status
  - globalconfigurations/status
  - gpuconsolidationpolicies/status
  - gpurebalancingpolicies/status
  - podaffinitypolicies/status
  - policyevaluations/status
  - proactivepolicies/status
  - rollbackpolicies/status
  - staticpolicies/status
  verbs:
  - get
  - patch
  - update
{{- end }}
