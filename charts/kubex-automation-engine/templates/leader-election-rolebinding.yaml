{{- if .Values.rbac.create -}}
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "kubex-automation-engine.fullname" . }}-leader-election-rolebinding
  namespace: {{ include "kubex-automation-engine.namespace" . }}
  labels:
    {{- include "kubex-automation-engine.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "kubex-automation-engine.fullname" . }}-leader-election-role
subjects:
- kind: ServiceAccount
  name: {{ include "kubex-automation-engine.serviceAccountName" . }}
  namespace: {{ include "kubex-automation-engine.namespace" . }}
{{- end }}
