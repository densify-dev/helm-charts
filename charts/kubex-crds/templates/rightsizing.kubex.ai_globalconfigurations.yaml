---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.19.0
  name: globalconfigurations.rightsizing.kubex.ai
spec:
  group: rightsizing.kubex.ai
  names:
    kind: GlobalConfiguration
    listKind: GlobalConfigurationList
    plural: globalconfigurations
    singular: globalconfiguration
  scope: Cluster
  versions:
  - name: v1alpha1
    schema:
      openAPIV3Schema:
        description: GlobalConfiguration is the Schema for the globalconfigurations
          API
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: spec defines the desired state of GlobalConfiguration
            properties:
              automationEnabled:
                default: true
                description: automationEnabled controls whether automation is globally
                  enabled.
                type: boolean
              kubexAPIRequestTimeout:
                default: 30s
                description: kubexAPIRequestTimeout controls timeout for outbound
                  requests to the Kubex API.
                type: string
              mutationLogInterval:
                default: 5m
                description: mutationLogInterval controls how often mutation logs
                  are sent.
                type: string
                x-kubernetes-validations:
                - message: must be at least 1 minute
                  rule: duration(self) >= duration('1m')
              protectedNamespacePatterns:
                default:
                - kube-*
                - openshift-*
                description: |-
                  protectedNamespacePatterns blocks resizing in matching namespaces.
                  Values support shell-style "*" wildcards (e.g., "prod-*").
                items:
                  minLength: 1
                  type: string
                type: array
              recommendationReloadInterval:
                default: 1h
                description: recommendationReloadInterval controls how often recommendations
                  are reloaded.
                type: string
                x-kubernetes-validations:
                - message: must be at least 1 minute
                  rule: duration(self) >= duration('1m')
              rescanInterval:
                default: 6h
                description: rescanInterval controls how often rescan actions are
                  triggered.
                type: string
                x-kubernetes-validations:
                - message: must be at least 1 minute
                  rule: duration(self) >= duration('1m')
              respectKubexAutomation:
                default: true
                description: respectKubexAutomation controls whether external recommendations
                  with KubexAutomation=false are ignored.
                type: boolean
              suppressFetchRecommendations:
                default: false
                description: suppressFetchRecommendations forces recommendations to
                  be loaded from file and skips gateway fetches.
                type: boolean
              webhookHealth:
                description: webhookHealth controls pod admission webhook probe health
                  transitions.
                properties:
                  failureThreshold:
                    default: 2
                    description: failureThreshold is the number of consecutive failed
                      probes required to transition to unhealthy.
                    format: int32
                    minimum: 1
                    type: integer
                  successThreshold:
                    default: 3
                    description: successThreshold is the number of consecutive successful
                      probes required to transition to healthy.
                    format: int32
                    minimum: 1
                    type: integer
                  transitionCheckInterval:
                    default: 10s
                    description: transitionCheckInterval controls probe cadence while
                      transitioning between healthy/unhealthy states.
                    type: string
                    x-kubernetes-validations:
                    - message: must be at least 1 second
                      rule: duration(self) >= duration('1s')
                type: object
            type: object
          status:
            description: status defines the observed state of GlobalConfiguration
            properties:
              conditions:
                description: |-
                  conditions represent the current state of the GlobalConfiguration resource.
                  Each condition has a unique type and reflects the status of a specific aspect of the resource.

                  Standard condition types include:
                  - "Available": the resource is fully functional
                  - "Progressing": the resource is being created or updated
                  - "Degraded": the resource failed to reach or maintain its desired state

                  The status of each condition is one of True, False, or Unknown.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              recommendationReload:
                description: recommendationReload captures the most recent recommendation
                  reload status.
                properties:
                  lastCount:
                    description: lastCount records the number of recommendations loaded
                      during the most recent successful reload.
                    format: int64
                    type: integer
                  lastError:
                    description: lastError records the last recommendation reload
                      error message.
                    type: string
                  lastErrorTime:
                    description: lastErrorTime records when the last recommendation
                      reload error occurred.
                    format: date-time
                    type: string
                  lastTime:
                    description: lastTime records the most recent recommendation reload.
                    format: date-time
                    type: string
                  proactiveRescanPending:
                    description: proactiveRescanPending indicates a proactive rescan
                      should be attempted.
                    type: boolean
                  proactiveRescanPendingTime:
                    description: proactiveRescanPendingTime records when proactive
                      rescan was requested.
                    format: date-time
                    type: string
                type: object
              rescan:
                description: rescan captures the most recent rescan status.
                properties:
                  lastTime:
                    description: lastTime records the most recent rescan action.
                    format: date-time
                    type: string
                type: object
              webhookHealth:
                description: webhookHealth captures webhook probe streaks and timestamps.
                properties:
                  consecutiveFailures:
                    description: consecutiveFailures is the count of consecutive failed
                      probes.
                    format: int32
                    type: integer
                  consecutiveSuccesses:
                    description: consecutiveSuccesses is the count of consecutive
                      successful probes.
                    format: int32
                    type: integer
                  lastProbeResult:
                    description: 'lastProbeResult records the latest probe outcome:
                      "Success" or "Failure".'
                    type: string
                  lastProbeTime:
                    description: lastProbeTime records when the webhook probe was
                      last executed.
                    format: date-time
                    type: string
                type: object
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
