stack:
  densify:
    username: '<changeme-username>' # mandatory (unless createSecret = false)
    encrypted_password: '<changeme-encrypted-password>' # mandatory (unless createSecret = false)

container-optimization-data-forwarder:
  config:
    forwarder:
      densify:
        url:
          host: '<changeme-kubex-host>' # mandatory: <instance>.kubex.ai
    clusters:
      - name: '<changeme-cluster-name>' # Mandatory, must be unique!

  # Optional: Additional labels to add to CronJob and Job resources
  # extraLabels:
  #   my-custom-label: my-value
  # Optional: Additional annotations to add to CronJob and Job resources
  # extraAnnotations:
  #   my-custom-annotation: my-value

# The following values are optional, if job cleanup is required;
# each one of these should be a non-negative integer (0 is allowed)
  # cronJob:
    # successfulJobsHistoryLimit: <value>
    # failedJobsHistoryLimit: <value>
    # ttlSecondsAfterFinished: <value> # applies for both the cronjob and the job
    # backoffLimit: <value> # applies for both the cronjob and the job, default: 4

# Ephemeral Storage Metrics (optional)
# Enables collection of ephemeral storage metrics for containers using containerd runtime
# Prerequisites: User workload monitoring must be enabled - run configure-os-monitoring.sh first
# kubex-ephemeral-storage-metrics:
#   enabled: true  # Set to false to disable ephemeral storage metrics
