stack:
  densify:
    createSecret: true

container-optimization-data-forwarder:
  image: densify/container-optimization-data-forwarder:ubi10-4
  # required for OpenShift
  assignedUIDs: true
  nameOverride: kubex-collection
  tolerations:
    - key: "kubernetes.io/arch"
      operator: "Exists"
      effect: "NoSchedule"
  extraLabels: {}
  extraAnnotations: {}
  config:
    forwarder:
      densify:
        url:
          UserSecretName: densify-api-secret
    prometheus:
      url:
        scheme: https
        host: thanos-querier.openshift-monitoring.svc
        port: 9091
      # OpenShift Service CA Operator ca cert
      ca_cert: /var/run/secrets/kubernetes.io/serviceaccount/service-ca.crt
  rbac:
    create: true
  serviceAccount:
    create: true
    name: kubex-collection

# Ephemeral Storage Metrics Exporter for OpenShift
# Collects and exposes ephemeral storage metrics via a DaemonSet
# Prerequisites: OpenShift user workload monitoring must be enabled for metrics to be scraped
k8s-ephemeral-storage-metrics:
  enabled: false  # Set to false to disable ephemeral storage metrics collection
  nameOverride: kubex-ephemeral-storage-collector
  tolerations:
    - key: "kubernetes.io/arch"
      operator: "Exists"
      effect: "NoSchedule"
  # OpenShift-compatible security context (no fixed UID/GID)
  securityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
    readOnlyRootFilesystem: true
    seccompProfile:
      type: RuntimeDefault
  podSecurityContext: {}
  # ServiceMonitor for OpenShift user workload monitoring
  serviceMonitor:
    enable: true
    interval: 30s
    scrapeTimeout: 10s