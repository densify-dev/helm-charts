image:
  repository: densify/gpu-process-exporter
  tag: "1.0.0"
  pullPolicy: Always

serviceAccount:
  create: true
  name: null

rbac:
  create: true
  clusterRoleName: gpu-exporter-role
  clusterRoleBindingName: gpu-exporter-binding

prometheusScrape:
  annotate: true
  interval: null

port: null

service:
  type: ClusterIP
  annotations: {}

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    memory: 256Mi

hostProcMount: null

nvmlSearchPath: null
