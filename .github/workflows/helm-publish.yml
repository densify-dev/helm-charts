name: Release Charts

on:
  push:
    branches:
      - master

permissions:
  contents: write
  packages: write
  id-token: write # Required for Cosign keyless signing via OIDC

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0 # Required to verify diffs
          ref: master

      - name: Set up Helm
        uses: azure/setup-helm@v5.0.0
        with:
          # Keep Helm 3 unless you have validated Helm 4 with your charts/customers.
          version: v3.20.2

      - name: Install Cosign
        uses: sigstore/cosign-installer@v4.1.1
        with:
          cosign-release: v3.0.6

      - name: Login to GHCR for OCI tools
        uses: docker/login-action@v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to GHCR for Helm
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | \
            helm registry login ghcr.io \
              --username "${{ github.actor }}" \
              --password-stdin

      - name: Add Helm Repos
        run: |
          helm repo add kubex https://densify-dev.github.io/helm-charts
          helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
          helm repo add groundhog2k https://groundhog2k.github.io/helm-charts
          helm repo update

      - name: Create temp directories
        run: |
          mkdir -p /tmp/kubex-charts
          rm -rf /tmp/kubex-charts/*.tgz

      - name: Package changed charts
        run: |
          set -euo pipefail
          # Check for changes in Chart.yaml and package
          # Get the list of changed files between the previous commit and the current one
          CHANGED_FILES=$(git diff --name-only ${{ github.event.before }} ${{ github.event.after }})
          
          echo "Processing charts..."
          
          # Iterate over directories in the charts folder
          for chart_dir in charts/*; do
            if [ -d "${chart_dir}" ]; then
              chart_name=$(basename "${chart_dir}")
              
              # Check if Chart.yaml for this specific chart is in the changed files list
              if printf '%s\n' "${CHANGED_FILES}" | grep -Fxq "${chart_dir}/Chart.yaml"; then
                echo "Changes detected in ${chart_name}/Chart.yaml. Packaging..."
                if grep -Eq '^[[:space:]]*dependencies:' "${chart_dir}/Chart.yaml"; then
                  if [ -f "${chart_dir}/Chart.lock" ]; then
                    helm dependency build "${chart_dir}"
                  else
                    helm dependency update "${chart_dir}"
                  fi
                fi
                helm lint "${chart_dir}"
                helm package "${chart_dir}" --destination /tmp/kubex-charts
              else
                echo "No changes in ${chart_name}/Chart.yaml. Skipping."
              fi
            fi
          done

      - name: Push charts to GHCR and sign with Cosign
        env:
          COSIGN_YES: "true" # bypass interactive prompt for transparency log
        run: |
          set -euo pipefail
          shopt -s nullglob

          owner_lc="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          cert_identity="https://github.com/${GITHUB_REPOSITORY}/.github/workflows/helm-publish.yml@refs/heads/master"

          oci_base="oci://ghcr.io/${owner_lc}/helm-charts"
          ref_base="ghcr.io/${owner_lc}/helm-charts"

          packages=(/tmp/kubex-charts/*.tgz)

          if [ "${#packages[@]}" -eq 0 ]; then
             echo "No charts were packaged. Exiting."
             exit 0
          fi

          for pkg in "${packages[@]}"; do
            chart_name="$(helm show chart "${pkg}" | awk -F': ' '$1 == "name" { print $2; exit }')"
            chart_version="$(helm show chart "${pkg}" | awk -F': ' '$1 == "version" { print $2; exit }')"

            if [ -z "${chart_name}" ] || [ -z "${chart_version}" ]; then
              echo "Could not read chart name/version from ${pkg}"
              exit 1
            fi

            echo "Pushing ${chart_name}:${chart_version}"

            push_output="$(helm push "${pkg}" "${oci_base}")"
            printf '%s\n' "${push_output}"

            digest="$(printf '%s\n' "${push_output}" | awk '/^Digest:/ { print $2; exit }')"

            if [ -z "${digest}" ]; then
              echo "Could not parse digest from helm push output for ${pkg}"
              exit 1
            fi

            ref="${ref_base}/${chart_name}@${digest}"

            echo "Signing ${ref}"
            cosign sign --yes "${ref}"

            echo "Verifying ${ref}"
            cosign verify \
              --certificate-identity "${cert_identity}" \
              --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
              "${ref}"
          done

      - name: Checkout gh-pages
        uses: actions/checkout@v5
        with:
          ref: gh-pages
          path: gh-pages-branch # Checkout to a subdir to avoid overwriting current workspace context, or clean and switch.
          fetch-depth: 0

      - name: Publish Charts
        working-directory: gh-pages-branch
        run: |
          # Check if there are any files to move (avoid failure if no charts changed)
          if [ -z "$(ls -A /tmp/kubex-charts)" ]; then
             echo "No charts were packaged. Exiting."
             exit 0
          fi

          # Move tgz files from temp to repo folder (gh-pages root)
          mv /tmp/kubex-charts/*.tgz .

          # Run helm index
          helm repo index . --url https://densify-dev.github.io/helm-charts/

          # Git add
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.yaml *.tgz

          # Git commit
          if git diff --cached --quiet; then
            echo "No gh-pages changes to commit. Exiting."
            exit 0
          fi

          git commit -m "Publish charts from commit ${{ github.sha }}"

          # Git push
          git push
